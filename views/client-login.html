<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Tomodachi.ai</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #05050f; --bg-1: #09091a; --bg-2: #0e0e22;
      --gold: #c9a84c; --gold-dim: rgba(201,168,76,0.12); --gold-border: rgba(201,168,76,0.22);
      --text: #ededf5; --text-2: #9898b8; --text-3: #55556a;
      --red: #e05555; --sans: 'Inter', -apple-system, sans-serif;
      --serif: 'Noto Serif JP', Georgia, serif; --r: 10px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-0); color: var(--text); font-family: var(--sans);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 44px 44px; pointer-events: none;
    }
    .agent-header {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 32px; text-align: center; position: relative; z-index: 1;
    }
    .agent-logo { width: 64px; height: 64px; border-radius: 12px; object-fit: contain; border: 1px solid var(--gold-border); background: var(--bg-2); margin-bottom: 10px; }
    .agent-logo-fallback { width: 64px; height: 64px; border-radius: 12px; background: var(--gold-dim); border: 1px solid var(--gold-border); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 1.4rem; color: var(--gold); margin-bottom: 10px; }
    .agent-name { font-family: var(--serif); font-size: 1.3rem; font-weight: 700; }
    .card { background: var(--bg-1); border: 1px solid var(--gold-border); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; position: relative; z-index: 1; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--text-2); font-size: 0.88rem; margin-bottom: 24px; }
    .notice { border-radius: var(--r); padding: 10px 14px; font-size: 0.88rem; margin-bottom: 16px; }
    .notice.warn { background: rgba(224,180,50,0.1); border: 1px solid rgba(224,180,50,0.3); color: #e2bb60; }
    .fg { margin-bottom: 14px; }
    label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    input { width: 100%; background: var(--bg-2); border: 1px solid var(--gold-border); color: var(--text); padding: 11px 14px; border-radius: var(--r); font-family: var(--sans); font-size: 0.92rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--gold); }
    .btn { width: 100%; background: linear-gradient(135deg, var(--gold), #e2bb60); border: none; color: #0a0806; padding: 13px; border-radius: var(--r); font-size: 1rem; font-weight: 700; font-family: var(--sans); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 4px; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.35); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .err { background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.3); color: var(--red); border-radius: var(--r); padding: 10px 14px; font-size: 0.88rem; margin-bottom: 16px; display: none; }
    .divider { text-align: center; margin: 18px 0; font-size: 0.82rem; color: var(--text-3); }
    .reg-link { text-align: center; }
    .reg-link a { color: var(--gold); text-decoration: none; font-size: 0.88rem; }
    .reg-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="agent-header" id="agentHeader"></div>

  <div class="card">
    <h1>Welcome Back</h1>
    <p class="sub">Sign in to access your Japan travel companion</p>

    <div id="expiredNotice" class="notice warn" style="display:none;">Your subscription has expired. Please contact your travel agent to renew.</div>
    <div class="err" id="err"></div>

    <form id="form" onsubmit="login(event)">
      <div class="fg">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@email.com" required autocomplete="username">
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="pw" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="btn" id="btn" type="submit">Sign In</button>
    </form>

    <div class="divider">New here?</div>
    <div class="reg-link"><a id="regLink" href="#">Create an account</a></div>
  </div>

  <script>
    const slug = window.location.pathname.split('/').filter(Boolean)[0];

    if (new URLSearchParams(window.location.search).get('expired') === '1') {
      document.getElementById('expiredNotice').style.display = 'block';
    }

    async function loadBrand() {
      try {
        const r = await fetch(`/api/brand/${slug}`);
        if (!r.ok) return;
        const agent = await r.json();
        document.title = `Sign In — ${agent.name}`;
        document.getElementById('regLink').href = `/${slug}`;
        const hdr = document.getElementById('agentHeader');
        hdr.innerHTML = agent.logo
          ? `<img class="agent-logo" src="${agent.logo}" alt="${agent.name}"><div class="agent-name">${agent.name}</div>`
          : `<div class="agent-logo-fallback">旅</div><div class="agent-name">${agent.name}</div>`;
      } catch {}
    }

    async function login(e) {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      err.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const r = await fetch(`/api/client/${slug}/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('pw').value })
        });
        const d = await r.json();
        if (r.ok) { window.location.href = d.redirect || `/${slug}/app`; return; }
        err.textContent = d.error || 'Login failed.'; err.style.display = 'block';
      } catch { err.textContent = 'Connection error. Please try again.'; err.style.display = 'block'; }
      btn.disabled = false; btn.textContent = 'Sign In';
    }

    loadBrand();
  </script>
</body>
</html>
